document.addEventListener('dragstart',e=>e.preventDefault());

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#010208;overflow:hidden;font-family:'JetBrains Mono',monospace}
canvas{display:block}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;justify-content:center;gap:24px;padding:12px;background:rgba(1,2,8,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,232,255,0.04)}

<body>

<div id="hint">MOVE CURSOR TO GUIDE THE FIGURE &middot; CLICK MONOLITHS TO ACTIVATE</div>
<div id="flash"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
window.addEventListener('load',()=>{setTimeout(()=>{document.getElementById('pg-overlay').style.opacity='0'},50)});
function goTo(url){const o=document.getElementById('pg-overlay');o.style.opacity='1';o.style.pointerEvents='all';setTimeout(()=>window.location.href=url,600)}

// ===== AUDIO =====
let audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function playFootstep(){
  if(!audioCtx)return;
  const buf=audioCtx.createBuffer(1,Math.floor(audioCtx.sampleRate*0.07),audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length)*0.8;
  const src=audioCtx.createBufferSource();src.buffer=buf;
  const lp=audioCtx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=400+Math.random()*200;
  const g=audioCtx.createGain();g.gain.setValueAtTime(0.2,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.07);
  src.connect(lp);lp.connect(g);g.connect(audioCtx.destination);src.start();
}
document.addEventListener('click',initAudio,{once:true});
document.addEventListener('mousemove',initAudio,{once:true});

// ===== THREE SETUP =====
const scene=new THREE.Scene();
const hour=new Date().getHours();
const isDay=hour>=6&&hour<20;
scene.fog=new THREE.FogExp2(0x010208,0.055);
scene.background=new THREE.Color(isDay?0x0a1520:0x010208);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;
document.body.appendChild(renderer.domElement);

const camera=new THREE.PerspectiveCamera(65,window.innerWidth/window.innerHeight,0.1,200);
camera.position.set(0,2.5,6);
camera.lookAt(0,1,-3);

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ===== LIGHTING =====
const ambient=new THREE.AmbientLight(isDay?0x203040:0x050810,0.4);
scene.add(ambient);

if(isDay){
  const sun=new THREE.DirectionalLight(0x8090a0,0.7);
  sun.position.set(5,10,5);
  sun.castShadow=true;
  scene.add(sun);
}

const cyanLight=new THREE.PointLight(0x00e8ff,0.8,20);
cyanLight.position.set(-3,3,-5);
scene.add(cyanLight);

const violetLight=new THREE.PointLight(0x9a7aff,0.5,15);
violetLight.position.set(3,2,-5);
scene.add(violetLight);

// ===== GROUND =====
const groundGeo=new THREE.PlaneGeometry(80,80);
const groundMat=new THREE.MeshStandardMaterial({
  color:isDay?0x0a2010:0x010308,
  emissive:isDay?0x0a1a08:0x00e8ff,
  emissiveIntensity:isDay?0.1:0.02,
  roughness:0.9,metalness:0.1
});
const ground=new THREE.Mesh(groundGeo,groundMat);
ground.rotation.x=-Math.PI/2;
ground.receiveShadow=true;
scene.add(ground);

const grid=new THREE.GridHelper(80,80,0x00e8ff,0x00e8ff);
grid.material.opacity=0.04;
grid.material.transparent=true;
scene.add(grid);

// ===== STARS =====
if(!isDay){
  const starGeo=new THREE.BufferGeometry();
  const starPos=new Float32Array(3000*3);
  for(let i=0;i<9000;i+=3){
    starPos[i]=(Math.random()-0.5)*400;
    starPos[i+1]=10+Math.random()*100;
    starPos[i+2]=(Math.random()-0.5)*400;
  }
  starGeo.setAttribute('position',new THREE.BufferAttribute(starPos,3));
  const starMat=new THREE.PointsMaterial({color:0xffffff,size:0.15,transparent:true,opacity:0.7});
  scene.add(new THREE.Points(starGeo,starMat));
}

// ===== DAY CLOUDS =====
if(isDay){
  for(let i=0;i<5;i++){
    const cg=new THREE.PlaneGeometry(8+Math.random()*6,3+Math.random()*2);
    const cm=new THREE.MeshBasicMaterial({color:0xaaccdd,transparent:true,opacity:0.12,side:THREE.DoubleSide});
    const c=new THREE.Mesh(cg,cm);
    c.position.set((Math.random()-0.5)*60,15+Math.random()*10,(Math.random()-0.5)*40-10);
    c.rotation.x=-0.1;
    scene.add(c);
  }
}

// ===== HOODED FIGURE =====
class HoodedFigure{
  constructor(){
    this.group=new THREE.Group();
    this.walkCycle=0;
    this.targetX=0;
    this.speed=0;
    this.lastX=0;
    this.footstepTimer=0;
    this.rLegGroup=null;
    this.lLegGroup=null;
    this.rArmGroup=null;
    this.lArmGroup=null;
    this.attacking=false;
    this.breathPhase=0;

    const bodyMat=new THREE.MeshStandardMaterial({color:0x000510,emissive:0x00e8ff,emissiveIntensity:0.25,roughness:0.8,metalness:0.3});
    const hoodMat=new THREE.MeshStandardMaterial({color:0x010308,emissive:0x9a7aff,emissiveIntensity:0.2,roughness:0.9,metalness:0.1});
    const lineMat=new THREE.LineBasicMaterial({color:0x00e8ff,transparent:true,opacity:0.7});

    function addEdges(mesh,mat){
      const edges=new THREE.EdgesGeometry(mesh.geometry);
      const lines=new THREE.LineSegments(edges,mat.clone());
      mesh.add(lines);
    }

    // Torso
    const torsoGeo=new THREE.CylinderGeometry(0.28,0.32,1.0,8);
    const torso=new THREE.Mesh(torsoGeo,bodyMat.clone());
    torso.position.y=0.5;torso.castShadow=true;
    addEdges(torso,lineMat);
    this.group.add(torso);

    // Head
    const headGeo=new THREE.SphereGeometry(0.18,8,6);
    const head=new THREE.Mesh(headGeo,bodyMat.clone());
    head.position.y=1.25;
    addEdges(head,lineMat);
    this.group.add(head);

    // Hood (pointed)
    const hoodGeo=new THREE.ConeGeometry(0.32,0.55,8);
    const hood=new THREE.Mesh(hoodGeo,hoodMat.clone());
    hood.position.y=1.52;
    addEdges(hood,lineMat);
    this.group.add(hood);

    // Cloak
    const cloakGeo=new THREE.ConeGeometry(0.65,1.5,8,1,true);
    const cloakMat=new THREE.MeshStandardMaterial({color:0x010308,emissive:0x9a7aff,emissiveIntensity:0.12,side:THREE.DoubleSide,roughness:0.95,transparent:true,opacity:0.95});
    const cloak=new THREE.Mesh(cloakGeo,cloakMat);
    cloak.position.y=0.0;
    this.group.add(cloak);

    // Left arm
    this.lArmGroup=new THREE.Group();
    this.lArmGroup.position.set(-0.42,0.8,0);
    const lArmGeo=new THREE.CylinderGeometry(0.06,0.06,0.7,6);
    const lArm=new THREE.Mesh(lArmGeo,bodyMat.clone());
    lArm.position.y=-0.35;
    addEdges(lArm,lineMat);
    this.lArmGroup.add(lArm);
    this.group.add(this.lArmGroup);

    // Right arm
    this.rArmGroup=new THREE.Group();
    this.rArmGroup.position.set(0.42,0.8,0);
    const rArmGeo=new THREE.CylinderGeometry(0.06,0.06,0.7,6);
    const rArm=new THREE.Mesh(rArmGeo,bodyMat.clone());
    rArm.position.y=-0.35;
    addEdges(rArm,lineMat);
    this.rArmGroup.add(rArm);
    this.group.add(this.rArmGroup);

    // Left leg
    this.lLegGroup=new THREE.Group();
    this.lLegGroup.position.set(-0.15,-0.15,0);
    const lLegGeo=new THREE.CylinderGeometry(0.09,0.07,0.8,6);
    const lLeg=new THREE.Mesh(lLegGeo,bodyMat.clone());
    lLeg.position.y=-0.4;
    addEdges(lLeg,lineMat);
    this.lLegGroup.add(lLeg);
    this.group.add(this.lLegGroup);

    // Right leg
    this.rLegGroup=new THREE.Group();
    this.rLegGroup.position.set(0.15,-0.15,0);
    const rLegGeo=new THREE.CylinderGeometry(0.09,0.07,0.8,6);
    const rLeg=new THREE.Mesh(rLegGeo,bodyMat.clone());
    rLeg.position.y=-0.4;
    addEdges(rLeg,lineMat);
    this.rLegGroup.add(rLeg);
    this.group.add(this.rLegGroup);

    // Circuit lines on torso
    const circuitPoints=[];
    for(let i=0;i<12;i++){
      const a=i*Math.PI/6;
      circuitPoints.push(new THREE.Vector3(Math.cos(a)*0.28,0.3+Math.sin(a)*0.2,Math.sin(a)*0.28));
    }
    const circuitGeo=new THREE.BufferGeometry().setFromPoints(circuitPoints);
    const circuit=new THREE.LineLoop(circuitGeo,new THREE.LineBasicMaterial({color:0x00e8ff,transparent:true,opacity:0.5}));
    circuit.position.y=0.5;
    this.group.add(circuit);

    this.group.position.set(0,0.9,1.5);
    this.group.scale.set(0.8,0.8,0.8);
    scene.add(this.group);
  }

  update(dt){
    if(this.attacking)return;

    this.group.position.x+=(this.targetX-this.group.position.x)*0.05;
    this.speed=Math.abs(this.group.position.x-this.lastX);
    this.lastX=this.group.position.x;

    // Face direction of movement
    if(this.speed>0.005){
      const dir=this.group.position.x-this.targetX;
      this.group.rotation.y+=(-Math.sign(dir)*0.15-this.group.rotation.y)*0.1;
    }

    // Walk animation
    if(this.speed>0.01){
      this.walkCycle+=this.speed*8;
      const swing=Math.sin(this.walkCycle)*0.4;
      this.lLegGroup.rotation.x=swing;
      this.rLegGroup.rotation.x=-swing;
      this.lArmGroup.rotation.x=-swing*0.5;
      this.rArmGroup.rotation.x=swing*0.5;

      // Footstep sound
      this.footstepTimer+=dt;
      if(this.footstepTimer>0.38){this.footstepTimer=0;playFootstep();}
    } else {
      this.lLegGroup.rotation.x*=0.85;
      this.rLegGroup.rotation.x*=0.85;
      this.lArmGroup.rotation.x*=0.85;
      this.rArmGroup.rotation.x*=0.85;
      this.footstepTimer=0;
    }

    // Breathing
    this.breathPhase+=0.02;
    this.group.position.y=0.9+Math.sin(this.breathPhase)*0.03;
  }

  doKick(onDone){
    this.attacking=true;
    let t=0;
    const iv=setInterval(()=>{
      t+=0.05;
      if(t<0.5){
        this.rLegGroup.rotation.x=Math.sin(t*Math.PI*2)*1.8;
      } else {
        this.rLegGroup.rotation.x=0;
        clearInterval(iv);
        this.attacking=false;
        if(onDone)onDone();
      }
    },20);
  }

  doPunch(onDone){
    this.attacking=true;
    let t=0;
    const iv=setInterval(()=>{
      t+=0.05;
      if(t<0.5){
        this.rArmGroup.rotation.x=Math.sin(t*Math.PI*2)*(-2.2);
      } else {
        this.rArmGroup.rotation.x=0;
        clearInterval(iv);
        this.attacking=false;
        if(onDone)onDone();
      }
    },20);
  }

  doBeam(targetPos,onDone){
    this.attacking=true;
    // Raise arms
    this.lArmGroup.rotation.x=-1.5;
    this.rArmGroup.rotation.x=-1.5;
    const handPos=new THREE.Vector3(0,2.2,1.5).add(new THREE.Vector3(this.group.position.x,0,0));
    const beamGeo=new THREE.SphereGeometry(0.08,8,6);
    const beamMat=new THREE.MeshBasicMaterial({color:0x00e8ff});
    const beam=new THREE.Mesh(beamGeo,beamMat);
    beam.position.copy(handPos);
    scene.add(beam);
    let t=0;
    const iv=setInterval(()=>{
      t+=0.04;
      const s=0.08+t*0.3;
      beam.scale.set(s,s,s);
      beam.position.lerp(targetPos,t*0.15);
      beamMat.color.setHSL(0.5+t*0.2,1,0.7);
      if(t>1.2){
        scene.remove(beam);
        clearInterval(iv);
        this.lArmGroup.rotation.x=0;
        this.rArmGroup.rotation.x=0;
        this.attacking=false;
        if(onDone)onDone();
      }
    },20);
  }

  attack(targetPos,type,onDone){
    if(type===0)this.doKick(onDone);
    else if(type===1)this.doPunch(onDone);
    else this.doBeam(targetPos,onDone);
  }
}

const figure=new HoodedFigure();

// ===== MONOLITHS =====
const monolithData=[
  {label:'HERO',url:'index.html',color:0x00e8ff,x:-7},
  {label:'ART',url:'art.html',color:0x9a7aff,x:-4.2},
  {label:'CINEMA',url:'cinema.html',color:0x00e8ff,x:-1.4},
  {label:'FASHION',url:'fashion.html',color:0xffd080,x:1.4},
  {label:'FORECAST',url:'forecast.html',color:0x7aff47,x:4.2},
  {label:'THE SWARM',url:'https://living-swarm-demo.vercel.app/',color:0xff5588,x:7},
];

const monoliths=[];
const shimmerParticles=[];
const debris=[];

function makeTextTexture(label,color){
  const canvas=document.createElement('canvas');
  canvas.width=128;canvas.height=256;
  const c=canvas.getContext('2d');
  c.fillStyle='rgba(0,0,0,0)';
  c.fillRect(0,0,128,256);
  const hex='#'+color.toString(16).padStart(6,'0');
  c.strokeStyle=hex;
  c.lineWidth=2;
  c.strokeRect(4,4,120,248);
  c.fillStyle=hex;
  c.font='bold 18px JetBrains Mono, monospace';
  c.textAlign='center';
  c.textBaseline='middle';
  c.fillText(label,64,128);
  // small lines
  c.lineWidth=0.5;
  c.strokeStyle='rgba(255,255,255,0.15)';
  for(let y=20;y<240;y+=12){c.beginPath();c.moveTo(10,y);c.lineTo(118,y);c.stroke();}
  const tex=new THREE.CanvasTexture(canvas);
  return tex;
}

monolithData.forEach((md,i)=>{
  const geo=new THREE.BoxGeometry(0.6,3.5,0.15);
  const mat=new THREE.MeshStandardMaterial({
    color:0x010510,
    emissive:new THREE.Color(md.color),
    emissiveIntensity:0.15,
    roughness:0.5,metalness:0.6
  });

  // front face texture
  const frontMat=new THREE.MeshStandardMaterial({
    color:0x010510,
    emissive:new THREE.Color(md.color),
    emissiveIntensity:0.2,
    map:makeTextTexture(md.label,md.color),
    roughness:0.5,metalness:0.6
  });

  const materials=[mat,mat,mat,mat,frontMat,mat];
  const monolith=new THREE.Mesh(geo,materials);
  monolith.position.set(md.x,1.75,-6+Math.abs(md.x)*0.08);
  monolith.castShadow=true;
  monolith.receiveShadow=true;

  const edges=new THREE.EdgesGeometry(geo);
  const edgeMat=new THREE.LineBasicMaterial({color:md.color,transparent:true,opacity:0.6});
  const edgeLines=new THREE.LineSegments(edges,edgeMat);
  monolith.add(edgeLines);

  monolith.userData={...md,index:i,active:false,hovered:false,shimmerT:0};
  scene.add(monolith);
  monoliths.push(monolith);
});

function shatterMonolith(monolith){
  const pieces=8;
  const geo=new THREE.BoxGeometry(0.075,0.875,0.15);
  for(let i=0;i<pieces;i++){
    const mat=new THREE.MeshStandardMaterial({
      color:0x010510,
      emissive:new THREE.Color(monolith.userData.color),
      emissiveIntensity:0.8,
      transparent:true,opacity:1
    });
    const mesh=new THREE.Mesh(geo,mat);
    mesh.position.copy(monolith.position);
    mesh.position.x+=(Math.random()-0.5)*0.4;
    mesh.position.y+=(Math.random()-0.5)*1.8;
    mesh.velocity=new THREE.Vector3(
      (Math.random()-0.5)*0.3,
      0.1+Math.random()*0.45,
      (Math.random()-0.5)*0.25
    );
    mesh.rotVel=new THREE.Vector3(Math.random()*0.12,Math.random()*0.12,Math.random()*0.12);
    scene.add(mesh);
    debris.push(mesh);
  }
  scene.remove(monolith);
  monoliths.splice(monoliths.indexOf(monolith),1);
}

// ===== MOUSE / RAYCASTER =====
const raycaster=new THREE.Raycaster();
const mouseVec=new THREE.Vector2();
let normMX=0;
let lastHovered=null;

window.addEventListener('mousemove',e=>{
  normMX=(e.clientX/window.innerWidth)*2-1;
  mouseVec.x=(e.clientX/window.innerWidth)*2-1;
  mouseVec.y=-(e.clientY/window.innerHeight)*2+1;
  figure.targetX=normMX*4;
});

window.addEventListener('click',e=>{
  raycaster.setFromCamera(mouseVec,camera);
  const hits=raycaster.intersectObjects(monoliths,false);
  if(hits.length>0){
    const m=hits[0].object;
    if(m.userData.active)return;
    m.userData.active=true;
    initAudio();

    // Figure walks toward monolith
    figure.targetX=m.userData.x*0.6;
    setTimeout(()=>{
      const attackType=Math.floor(Math.random()*3);
      figure.attack(m.position,attackType,()=>{
        // shatter after attack
        setTimeout(()=>{
          shatterMonolith(m);
          // flash
          const flash=document.getElementById('flash');
          flash.style.opacity='0.6';
          flash.style.transition='opacity 0.1s';
          setTimeout(()=>{
            flash.style.opacity='0';
            flash.style.transition='opacity 0.5s';
            setTimeout(()=>goTo(m.userData.url),400);
          },100);
        },200);
      });
    },800);
  }
});

// ===== ANIMATE =====
let lastTime=performance.now();
function animate(){
  requestAnimationFrame(animate);
  const now=performance.now();
  const dt=(now-lastTime)/1000;
  lastTime=now;
  const t=now*0.001;

  figure.update(dt);

  // Monolith hover
  raycaster.setFromCamera(mouseVec,camera);
  const hits=raycaster.intersectObjects(monoliths,false);

  // Reset all
  monoliths.forEach(m=>{
    if(!m.userData.active){
      m.userData.hovered=false;
      m.material[0].emissiveIntensity=0.15;
      m.material[4].emissiveIntensity=0.2;
    }
  });

  if(hits.length>0){
    const m=hits[0].object;
    if(!m.userData.active){
      m.userData.hovered=true;
      const pulse=0.5+Math.sin(t*6)*0.3;
      m.material[0].emissiveIntensity=pulse;
      m.material[4].emissiveIntensity=pulse+0.1;
    }
  }

  // Monolith idle pulse
  monoliths.forEach(m=>{
    if(!m.userData.hovered&&!m.userData.active){
      m.material[0].emissiveIntensity=0.1+Math.sin(t*1.5+m.userData.index)*0.05;
    }
  });

  // Debris physics
  for(let i=debris.length-1;i>=0;i--){
    const p=debris[i];
    p.velocity.y-=0.015;
    p.position.add(p.velocity);
    p.rotation.x+=p.rotVel.x;
    p.rotation.y+=p.rotVel.y;
    p.rotation.z+=p.rotVel.z;
    p.material.opacity-=0.008;
    if(p.material.opacity<=0){scene.remove(p);debris.splice(i,1);}
  }

  // Camera parallax
  camera.position.x+=(normMX*0.5-camera.position.x)*0.03;
  camera.lookAt(camera.position.x*0.3,1,-3);

  // Lights pulse
  cyanLight.intensity=0.7+Math.sin(t*2.1)*0.15;
  violetLight.intensity=0.4+Math.sin(t*1.7+1)*0.12;

  renderer.render(scene,camera);
}
animate();

// Hide hint after 5s
setTimeout(()=>{document.getElementById('hint').style.opacity='0'},5000);
</script>
